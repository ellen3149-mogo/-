<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>踩地雷 Minesweeper</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <h1>踩地雷（Flask + C）</h1>
        <p class="subtitle">左鍵翻格，右鍵插旗，操作模式接近老師範例。</p>

        <section class="panel">
            <h2>新遊戲</h2>
            <form id="new-game-form" class="settings">
                <label>列數
                    <input id="rows" type="number" min="5" max="30" value="9" required>
                </label>
                <label>行數
                    <input id="cols" type="number" min="5" max="30" value="9" required>
                </label>
                <label>地雷數
                    <input id="mines" type="number" min="1" value="10" required>
                </label>
                <button type="submit">開始</button>
                <button id="undo-btn" type="button">上一步 (Undo)</button>
            </form>
            <div id="error" class="alert hidden"></div>
        </section>

        <section class="panel">
            <div id="status" class="status hidden"></div>
            <div id="timer" class="timer hidden"></div>
            <div id="best-record" class="best hidden"></div>
            <p id="result" class="result hidden"></p>
            <div id="board" class="board"></div>
        </section>

        <section class="panel">
            <h2>多人 / 多盤 Session</h2>
            <div class="session-row">
                <button id="refresh-games-btn" type="button">更新列表</button>
                <span id="active-game-hint" class="active-hint"></span>
            </div>
            <ul id="game-list" class="game-list"></ul>
        </section>

        <section class="panel">
            <h2>操作歷史 (Linked List)</h2>
            <ol id="history-list" class="history-list"></ol>
        </section>
    </main>
    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
